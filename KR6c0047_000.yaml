front:
  text: 金剛般若波羅蜜經序夫金剛經者無相為宗無住為體妙有為用自從達磨西來為傳此經之意令人悟理見性秪為世人不見自性是以立見性之法世人若了見真如本體即不假立法此經讀誦者無數稱讚者無邊造疏及注解者凡八百餘家所說道理各隨所見見雖不同法即無二宿植上根者一聞便了若無宿慧讀誦雖多不悟佛意是故解釋聖義斷除學者疑心若於此經得旨無疑不假解說從上如來所說善法為除凡夫不善之心經是聖人之語教人聞之超凡悟聖永息迷心此一卷經衆生性中本有不自見者但讀誦文字若悟本心始知此經不在文字若能明了自性方信一切諸佛從此經出今恐世人身外覓佛向外求經不發內心不持內經故造此訣令諸學者持內心經了然自見清淨佛心過於數量不可思議後之學者讀經有疑見此解義疑心釋然更不用訣所冀學者同見礦中金性以智慧火鎔鍊礦去金存我釋迦本師說金剛經在舍衛國因須菩提起問佛大悲為說須菩提聞法得悟請佛與法安名令後人依而受持故經云佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持如來所說金剛般若波羅蜜與法為名其意謂何以金剛世界之寶其性猛利能壞諸物金雖至堅羚羊角能壞金剛喻佛性羚羊角喻煩惱金雖堅剛羚羊角能碎佛性雖堅煩惱能亂煩惱雖堅般若智能破羚羊角雖堅賓鐵能壞悟此理者了然見性涅槃經云見佛性者不名衆生不見佛性是名衆生如來所說金剛喻者秪為世人性無堅固口雖誦經光明不生外誦內行光明齊等內無堅固定慧即亡口誦心行定慧均等是名究竟金在山中山不知是寶寶亦不知是山何以故為無性故人則有性取其寶用得遇金師鏨鑿山破取礦烹鍊遂成精金隨意使用得免貧苦四大身中佛性亦爾身喻世界人我喻山煩惱喻礦佛性喻金智慧喻工匠精進猛勇喻鏨鑿身世界中有人我山人我山中有煩惱礦煩惱礦中有佛性寶佛性寶中有智慧工匠用智慧工匠鑿破人我山見煩惱礦以覺悟火烹鍊見自金剛佛性了然明淨是故以金剛為喻因為之名也空解不行有名無體解義修行名體具備不修即凡夫修即同聖智故名金剛也何名般若般若是梵語唐言智慧智者不起愚心慧者有其方便慧是智體智是慧用體若有慧用智不愚體若無慧用愚無智秪為愚癡未悟故修智慧以除之也何名波羅蜜唐言到彼岸到彼岸者離生滅義秪緣世人性無堅固於一切法上有生滅相流浪諸趣未到真如之地並是此岸要具大智慧於一切法圓滿離生滅相即是到彼岸也亦云心迷則此岸心悟則彼岸心邪則此岸心正則彼岸口說心行即自法身有波羅蜜口說心不行即無波羅蜜也何名為經經者徑也是成佛之道路凡人欲臻斯路當內修般若行以至究竟如或但能誦說心不依行自心則無經實見實行自心則有經故此經如來號為金剛般若波羅蜜經曹溪六祖大師慧能撰
