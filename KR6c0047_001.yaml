body:
  text: 東晉武帝時後秦沙門鳩摩羅什奉詔譯梁昭明太子嘉其分目唐六祖大鑒真空普覺禪師解義法會因由分第一如是我聞如者指義是者定詞阿難自稱如是之法我從佛聞明不自說也故言如是我聞又我者性也性即我也內外動作皆由於性一切盡聞故稱我聞也一時佛在舍衛國祗樹給孤獨園言一時者師資會遇齊集之時佛者是說法之主在者欲明處所舍衛國者波斯匿王所居之國祗者太子名也樹是祗陀太子所施故言祗樹也給孤獨者須達長者之異名也園者本屬須達故言給孤獨園佛者梵音唐言覺也覺義有二一者外覺觀諸法空二者內覺諸心空寂不被六塵所染外不見人之過惡內不被邪迷所惑故名曰覺覺即是佛也與大比丘衆千二百五十人俱言與者佛與比丘同住金剛般若無相道場故言與也大比丘者是大阿羅漢故比丘者是梵語唐言能破六賊故名比丘衆多也千二百五十人者其數也俱者同處平等法會爾時世尊食時著衣持鉢入舍衛大城乞食於其城中爾時者當此之時是今辰時齊時欲至也著衣持鉢者為顯教示跡故也入者為自城外而入也舍衛大城者名舍衛國豐德城也即波斯匿王所居之城故言舍衛大城也言乞食者表如來能下心於一切衆生也次第乞已還至本處飯食訖收衣鉢洗足已敷座而坐次第者不擇貧富平等以化也乞已者如多乞不過七家七家數滿更不至餘家也還至本處者佛意制諸比丘除請召外不得輒向白衣舍故云爾洗足者如來示現順同凡夫故曰洗足又大乘法不獨以洗手足為淨蓋言洗手足不若淨心一念心淨則罪垢悉除矣如來欲說法時常儀敷施壇座故言敷座而坐也善現起請分第二時長老須菩提何名長老德尊年高故名長老須菩提是梵語唐言解空在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言隨衆所坐故云即從座起弟子請益先行五種儀一者從坐而起二者端整衣服三者偏袒右肩右膝著地四者合掌瞻仰尊顏目不暫捨五者一心恭敬以伸問辭希有世尊希有略說三義第一希有能捨金輪王位第二希有身長丈六紫磨金容三十二相八十種好三界無比第三希有性能含吐八萬四千法三身圓備以具上三義故云希有也世尊者智慧超過三界無有能及者德高更無有上一切咸恭敬故曰世尊如來善護念諸菩薩善付囑諸菩薩護念者如來以般若波羅蜜法護念諸菩薩付囑者如來以般若波羅蜜法付囑須菩提諸大菩薩言善護念者令諸學人以般若智護念自身心不令妄起憎愛染外六塵墮生死苦海於自心中念念常正不令邪起自性如來自善護念言善付囑者前念清淨付囑後念後念清淨無有間斷究竟解脫如來委曲誨示衆生及在會之衆當常行此故云善付囑也菩薩者梵語唐言道心衆生亦云覺有情道心者常行恭敬乃至蠢動含靈普敬愛之無輕慢心故名菩薩世尊善男子善女人善男子者平坦心也亦是正定心也能成就一切功德所往無礙也善女人者是正慧心也由正慧心能出生一切有為無為功德也發阿耨多羅三藐三菩提心云何應住云何降伏其心須菩提問一切發菩提心人應云何住云何降伏其心須菩提見一切衆生躁擾不停猶如隙塵搖動之心起如飄風念念相續無有間歇問欲修行如何降伏佛言善哉善哉須菩提如汝所說如來善護念諸菩薩善付囑諸菩薩是佛讚嘆須菩提善得我心善得我意也汝今諦聽當為汝說佛欲說法常先戒敕令諸聽者一心靜默吾當為說善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心阿之言無耨多羅之言上三之言正藐之言遍菩提之言知無者無諸垢染上者三界無能比正者正見也偏者一切智也知者知一切有情皆有佛性但能修行盡得成佛佛者即是無上清淨般若波羅蜜也是以一切善男子善女人若欲修行應知無上菩提道應知無上清淨般若波羅蜜多法以此降伏其心也唯然世尊願樂欲聞唯然者應諾之辭願樂者願佛廣說令中下根機盡得開悟樂者樂聞深法欲聞者渴仰慈誨也大乘正宗分第三佛告須菩提諸菩薩摩訶薩應如是降伏其心前念清淨後念清淨名為菩薩念念不退雖在塵勞心常清淨名摩訶薩又慈悲喜捨種種方便化導衆生名為菩薩能化所化心無取著是名摩訶薩恭敬一切衆生即是降伏自心處真者不變如者不異遇諸境界心無變異名曰真如亦云外不假曰真內不亂曰如念念無差即是降伏其心也所有一切衆生之類若卵生若胎生若濕生若化生若有色若無色若有想若無想若非有想若非無想我皆令入無餘涅槃卵生者迷性也胎生者習性也濕生者隨邪性也化生者見趣性也迷故造諸業習故常流轉隨邪心不定見趣多偏墜起心修心妄見是非內不契無相之理名為有色內心守直不行恭敬供養但言直心是佛不修福慧名為無色不了中道眼見耳聞心想思惟愛著法相口說佛行心不依行名為有想迷人坐禪一向除妄不學慈悲喜捨智慧方便猶如木石無有作用名為無想不著二法想故名若非有想求理心在故名若非無想煩惱萬差皆是垢心身形無數總名衆生如來大悲普化皆令得入無餘涅槃而滅度之如來指示三界九地衆生各有涅槃妙心令自悟入無餘無餘者無習氣煩惱也涅槃者圓滿清淨義滅盡一切習氣令永不生方契此也度者渡生死大海也佛心平等普願與一切衆生同入圓滿清淨無餘涅槃同渡生死大海同諸佛所證也有人雖悟雖修作有所得心者却生我相名為法我除盡法我方名滅度也如是滅度無量無數無邊衆生實無衆生得滅度者如是者指前法也滅度者大解脫也大解脫者煩惱及習氣一切諸業障滅盡更無有餘是名大解脫無量無數無邊衆生元各自有一切煩惱貪嗔惡業若不斷除終不得解脫故言如是滅度無量無數無邊衆生一切迷人悟得自性始知佛不見自相不有自智何曾度衆生祗為凡夫不見自本心不識佛意執著諸相不達無為之理我人不除是名衆生若離此病實無衆生得滅度者故言妄心無處即菩提生死涅槃本平等何滅度之有何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩衆生佛性本無有異緣有四相不入無餘涅槃有四相即是衆生無四相即是佛迷即佛是衆生悟即衆生是佛迷人恃有財寶學問族姓輕慢一切人名我相雖行仁義禮智信而意高自負不行普敬言我解行仁義禮智信不合敬爾名人相好事皈己惡事施於人名衆生相對境取捨分別名壽者相是謂凡夫四相修行人亦有四相心有能所輕慢衆生名我相自恃持戒輕破戒者名人相厭三塗苦願生諸天是衆生相心愛長年而勤修福業諸執不忘是壽者相有四相即是衆生無四相即是佛妙行無住分第四復次須菩提菩薩於法應無所住行於布施所謂不住色布施不住聲香味觸法布施凡夫布施祗求身相端嚴五欲快樂故報盡却墮三塗世尊大慈教行無相布施者不求身相端嚴五欲快樂但令內破慳心外利益一切衆生如是相應名不住色布施須菩提菩薩應如是布施不住於相應如無相心布施者為無能施之心不見有施之物不分別受施之人是名不住相布施也何以故若菩薩不住相布施其福德不可思量菩薩行施心無所希求其所獲福德如十方虗空不可較量言復次者連前起後之辭一說布者普也施者散也能普散盡心中妄念習氣煩惱四相泯絶無所蘊積是真布施又說布施者由不住六塵境界又不有漏分別惟當返皈清淨了萬法空寂若不了此意惟增諸業故須內除貪愛外行布施內外相應獲福無量見人作惡不見其過自性不生分別是名離相依教修行心無能所即是善法修行人心有能所不名善法能所心不滅終未得解脫念念常行般若智其福無量無邊依如是修行感得一切天人恭敬供養是名為福德常行不住相布施普敬一切含生其功德無有邊際不可稱計須菩提於意云何東方虗空可思量不不也世尊緣不住相布施所得功德不可稱量佛以東方虗空為譬喻故問須菩提東方虗空可思量不不也世尊者須菩提言東方虗空不可思量也須菩提南西北方四維上下虗空可思量不不也世尊須菩提菩薩無住相布施福德亦復如是不可思量佛言虗空無有邊際不可度量菩薩無住相布施所得功德亦如虗空不可度量無邊際也世界中大者莫過虗空一切性中大者莫過佛性何以故凡有形相者不得名為大虗空無形相故得名為大一切諸性皆有限量不得名為大佛性無有限量故名為大此虗空中本無東西南北若見東西南北亦是住相不得解脫佛性本無我人衆生壽者若有此四相可見即是衆生性不名佛性亦所謂住相布施也雖於妄心中說有東西南北在理則何有所謂東西不真南北曷異自性本來空寂混融無所分別故如來深讚不生分別也須菩提菩薩但應如所教住應者唯也但唯如上所說之教住無相布施即是菩薩也如理實見分第五須菩提於意云何可以身相見如來不不也世尊不可以身相得見如來色身即有相法身即無相色身者四大和合父母所生肉眼所見法身者無有形段非有青黃赤白無一切相貌非肉眼能見慧眼乃能見之凡夫但見色身如來不見法身如來法身量等虗空是故佛問須菩提可以身相見如來不須菩提知凡夫但見色身如來不見法身如來故言不也世尊不可以身相得見如來何以故如來所說身相即非身相色身是相法身是性一切善惡盡由法身不由色身法身若作惡色身不生善處法身作善色身不墮惡處凡夫唯見色身不見法身不能行無住相布施不能於一切處行平等行不能普敬一切衆生見法身者即能行無住相布施即能普敬一切衆生即能修般若波羅蜜行方信一切衆生同一真性本來清淨無有垢穢具足恆河妙用佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來如來欲顯法身故說一切諸相皆是虗妄若見一切諸相虗妄不實即見如來無相之理也正信希有分第六須菩提白佛言世尊頗有衆生得聞如是言說章句生實信不須菩提問此法甚深難信難解末世凡夫智慧微劣云何信入佛答在次下佛告須菩提莫作是說如來滅後後五百歲有持戒修福者於此章句能生信心以此為實當知是人不於一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根聞是章句乃至一念生淨信者於我滅後後五百歲若復有人能持大乘無相戒不妄取諸相不造生死業一切時中心常空寂不被諸相所縛即是無所住心於如來深法心能信入此人所謂言說真實可信何以故此人不於一劫二劫三四五劫而種善根已於無量千萬億劫種諸善根是故如來說我滅後後五百歲有能離相修行者當知是人不於一二三四五佛種諸善根何名種諸善根略述次下所謂於諸佛所一心供養隨順教法於諸菩薩善知識師僧父母耆年宿德尊長之處常行恭敬供養承順教命不違其意是名種諸善根於一切貧苦衆生起慈愍心不生輕厭有所須求隨力惠施是名種諸善根於一切惡類自行和柔忍辱歡喜逢迎不逆其意令彼發歡喜心息剛戾心是名種諸善根於六道衆生不加殺害不欺不賤不毀不辱不騎不箠不食其肉常行饒益是名種諸善根信心者信般若波羅蜜能除一切煩惱信般若波羅蜜能成就一切出此功德信般若波羅蜜能出生一切諸佛信自身中佛性本來清淨無有染污與諸佛性平等無二信六道衆生本來無相信一切衆生盡能成佛是名清淨信心也須菩提如來悉知悉見是諸衆生得如是無量福德何以故是諸衆生無復我相人相衆生相壽者相無法相亦無非法相若有人於如來滅後發般若波羅蜜心行般若波羅蜜行修習悟解得佛深意者諸佛無不知之若有人聞上乘法一心受持即能行般若波羅蜜無相無著之行了無我人衆生壽者四相無我者無色受想行識也無人者了四大不實終歸地水火風也無衆生者無生滅心也無壽者我身本無寧有壽者四相既亡即法眼明徹不著有無遠離二邊自心如來自悟自覺永離塵勞妄念自然得福無邊無法相者離名絶相不拘文字也亦無非法相者不得言無般若波羅蜜法若言無般若波羅蜜法者即是謗法何以故是諸衆生若心取相則為著我人衆生壽者若取法相即著我人衆生壽者何以故若取非法相即著我人衆生壽者取此三相並著邪見盡是迷人不悟經意故修行人不得愛著如來三十二相不得言我解般若波羅蜜法亦不得言不行般若波羅蜜行而得成佛是故不應取法不應取非法以是義故如來常說汝等比丘知我說法如筏喻者法尚應捨何況非法法者是般若波羅蜜法非法者生天等法般若波羅蜜法能令一切衆生過生死大海既得過已尚不應住何況生天等法而得樂著無得無說分第七須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所說法耶須菩提言如我解佛所說義無有定法名阿耨多羅三藐三菩提亦無有定法如來可說阿耨多羅非從外得但心無我所即是也秪緣對病設藥隨宜為說何有定法乎如來說無上正法心本無得亦不言不得但為衆生所見不同如來應彼根性種種方便開誘化導俾其離諸執著指示一切衆生妄心生滅不停逐境界動前念瞥起後念應覺覺既不住見亦不存若爾豈有定法為如來可說也阿者心無妄念耨多羅者心無驕慢三者心常在正定藐者心常在正慧三菩提者心常空寂一念凡心頓除即見佛性何以故如來所說法皆不可取不可說非法非非法恐人執著如來所說文字章句不悟無相之理妄生知解故言不可取如來為化種種衆生應機隨量所有言說亦何有定乎學人不解如來深意但誦如來所說教法不了本心不了本心終不成佛故言不可說也口誦心不行即非法口誦心行了無所得即非非法所以者何一切賢聖皆以無為法而有差別三乘根性所解不同見有深淺故言差別佛說無為法者即是無住無住即是無相無相即無起無起即無滅蕩然空寂照用齊收鑒覺無礙乃真是解脫佛性佛即是覺覺即是觀照觀照即是智慧智慧即是般若波羅蜜多又本云聖賢說法具一切智萬法在性隨問差別令人心開各自見性依法出生分第八須菩提於意云何若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多世尊何以故是福德即非福德性是故如來說福德多三千大千世界七寶以用布施得福雖多於性上一無利益依摩訶般若波羅蜜多修行令自性不墮諸有是名福德性心有能所即非福德性能所心滅是名福德性心依佛教行同佛行是名福德性不依佛教不能踐履佛行即非福德性若復有人於此經中受持乃至四句等偈為他人說其福勝彼十二部教大意盡在四句之中何以知其然以諸經中讚嘆四句偈即是摩訶般若波羅蜜多以摩訶般若為諸佛母三世諸佛皆依此經修行方得成佛般若心經云三世諸佛依般若波羅蜜多故得阿耨多羅三藐三菩提從師所學曰受解義修行曰持自解自行是自利為人演說是利他功德廣大無有邊際何以故須菩提一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出此經者非指此一卷之文也要顯佛性從體起用妙利無窮般若者即智慧也智以方便為功慧以決斷為用即一切時中覺照心是一切諸佛及阿耨多羅三藐三菩提法皆從覺照生故云此經出也須菩提所謂佛法者即非佛法所說一切文字章句如標如指標指者影響之義依標取物依指觀月月不是指標不是物但依經取法經不是法經文則肉眼可見法則慧眼能見若無慧眼者但見其文不見其法若不見法即不解佛意不解佛意則誦經不成佛道一相無相分第九須菩提於意云何須陀洹能作是念我得須陀洹果不須菩提言不也世尊須陀洹者梵語唐言逆流逆生死流不染六塵一向修無漏業得粗重煩惱不生決定不受地獄畜生修羅異類之身名須陀洹果若了無相法即無得果之心微有得果之心即不名須陀洹故言不也何以故須陀洹名為入流而無所入不入色聲香味觸法是名須陀洹流者聖流也須陀洹人已離粗重煩惱故得入聖流而無所入者無得果之心也須陀洹者乃修行人初果也須菩提於意云何斯陀含能作是念我得斯陀含果不須菩提言不也世尊何以故斯陀含名一往來而實無往來是名斯陀含斯陀含者梵語唐言一往來捨三界結縛三界結盡故名斯陀含斯陀含名一往來往來從天上却到人間生從人間死却生天上竟遂出生死三界業盡名斯陀含果大乘斯陀含者目覩諸境心有一生一滅無第二生滅故名一往來前念起妄後念即止前念有著後念即離故實無往來須菩提於意云何阿那含能作是念我得阿那含果不須菩提言不也世尊何以故阿那含名為不來而實無來是故名阿那含阿那含梵語唐言不還亦名出欲出欲者外不見可欲之境內無欲心可行定不向欲界受生故名不來而實無來亦名不還以欲習永盡決定不來受生是故名阿那含須菩提於意云何阿羅漢能作是念我得阿羅漢道不須菩提言不也世尊諸漏已盡無復煩惱名阿羅漢阿羅漢者煩惱永盡與物無諍若作得果之心即是有諍何以故實無有法名阿羅漢世尊若阿羅漢作是念我得阿羅漢道即為著我人衆生壽者阿羅漢梵語唐言無諍無煩惱可斷無貪嗔可離性無違順心境俱空內外常寂若有得果之心即同凡夫故言不也世尊佛說我得無諍三昧人中最為第一是第一離欲阿羅漢世尊我不作是念我是離欲阿羅漢何名無諍三昧謂阿羅漢心無生滅去來唯有本覺常照故名無諍三昧三昧梵語此云正受亦云正見遠離九十五種邪見是名正見然空中亦有明暗諍性中有邪正諍念念常正無一念邪心即是無諍三昧修此三昧人中最為第一若有一念得果之心即不名無諍三昧世尊我若作是念我得阿羅漢道世尊即不說須菩提是樂阿蘭那行者以須菩提實無所行而名須菩提是樂阿蘭那行阿蘭那是梵語唐言無諍行無諍即是清淨行清淨行者為除去有所得心也若存有所得心即是有諍有諍即非清淨道常得無所得心即是無諍行也莊嚴淨土分第十佛告須菩提於意云何如來昔在然燈佛所於法有所得不不也世尊如來在然燈佛所於法實無所得佛恐須菩提有得法之心為遣此疑故問之須菩提知法無所得而白佛言不也然燈佛是釋迦佛授記之師故問須菩提我於師處有法可得不須菩提即謂法因師開示而實無所得但悟自性本來清淨本無塵勞寂然常照即自成佛當知世尊在然燈佛所於法實無所得如來法者譬如日光明照無有邊際而不可取須菩提於意云何菩薩莊嚴佛土不不也世尊何以故莊嚴佛土者即非莊嚴是名莊嚴清淨佛土無相無形何物而能莊嚴耶唯以定慧之寶假名莊嚴事理莊嚴有三第一莊嚴世間佛土造寺寫經布施供養是也第二莊嚴身佛土見一切人普行恭敬是也第三莊嚴心佛土心淨即佛土淨念念常行佛心是也是故須菩提諸菩薩摩訶薩應如是生清淨心不應住色生心不應住聲香味觸法生心應無所住而生其心此修行人不應談他是非自言我能我解心輕未學此非清淨心也自性常生智慧行平等慈下心恭敬一切衆生是修行人清淨心也若不自淨其心愛著清淨處心有所住即是著法相見色著色住色生心即是迷人見色離色不住色生心即是悟人住色生心如雲蔽天不住色生心如空無雲日月常照住色生心即是妄念不住色生心即是真智妄念生則暗真智照則明明則煩惱不生暗則六塵競起須菩提譬如有人身如須彌山王於意云何是身為大不須菩提言甚大世尊何以故佛說非身是名大身色身雖大內心量小不名大身內心量大等虗空界方名大身色身縱如須彌山不為大也無為福勝分第十一須菩提如恆河中所有沙數如是沙等恆河於意云何是諸恆河沙寧為多不須菩提言甚多世尊但諸恆河尚多無數何況其沙須菩提我今實言告汝若有善男子善女人以七寶滿爾所恆河沙數三千大千世界以用布施得福多不須菩提言甚多世尊佛告須菩提若善男子善女人於此經中乃至受持四句偈等為他人說而此福德勝前福德布施七寶得三界中富貴報講說大乘經典令諸聞者生大智慧成無上道當知受持福德勝前七寶福德
