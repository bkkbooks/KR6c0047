body:
  text: 東晉武帝時後秦沙門鳩摩羅什奉詔譯梁昭明太子嘉其分目唐六祖大鑒真空普覺禪師解義尊重正教分第十二復次須菩提隨說是經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟所在之處如有人即說是經若念念常行無念心無所得心不作能所心說若能遠離諸心常依無所得心即此身中有如來金身舍利故言如佛塔廟以無所得心說此經者感得天龍八部悉來聽受心若不清淨但為名聲利益而說是經者死墮三塗有何利益心若清淨為說是經令諸聽者除迷妄心悟得本來佛性常行真實感得天人阿修羅等皆來供養持經之人也何況有人盡能受持讀誦須菩提當知是人成就最上第一希有之法若是經典所在之處則為有佛若尊重弟子自心誦得此經自心解得經義自心體得無著無相之理所在之處常修佛行念念心無有間歇即自心是佛故言所在之處則為有佛如法受持分第十三爾時須菩提白佛言世尊當何名此經我等云何奉持佛告須菩提是經名為金剛般若波羅蜜以是名字汝當奉持所以者何須菩提佛說般若波羅蜜即非般若波羅蜜是名般若波羅蜜佛說般若波羅蜜令諸學人用智慧除却愚心生滅生滅除盡即到彼岸若心有所得即不到彼岸心無一法可得即是彼岸口說心行乃是到彼岸須菩提於意云何如來有所說法不須菩提白佛言世尊如來無所說佛問須菩提如來說法心有所得不須菩提知如來說法心無所得故言無所說也如來意者欲令世人離有所得之心故說般若波羅蜜法令一切人聞之皆發菩提心悟無生理成無上道也須菩提於意云何三千大千世界所有微塵是為多不須菩提言甚多世尊須菩提諸微塵如來說非微塵是名微塵如來說世界非世界是名世界如來說眾生性中妄念如三千大千世界中所有微塵一切眾生被妄念微塵起滅不停遮蔽佛性不得解脫若能念念真正修般若波羅蜜無著無相之行了妄念塵勞即清淨法性妄念既無即非微塵是名微塵了真即妄了妄即真真妄俱泯無別有法故云是名微塵性中無塵勞即是佛世界心中有塵勞即是眾生世界了諸妄念空寂故云非世界證得如來法身普見塵剎應用無方是名世界須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來何以故如來說三十二相即是非相是名三十二相三十二相者是三十二清淨行三十二清淨行者於五根中修六波羅蜜於意根中修無相無為是名三十二清淨行常修此三十二清淨行即得成佛若不修三十二相清淨行終不成佛但愛著如來三十二相自不修三十二行終不得見如來須菩提若有善男子善女人以恒河沙等身命布施若復有人於此經中乃至受持四句偈等為他人說其福甚多世間重者莫過於身命菩薩為法於無量劫中捨施身命與一切眾生其福雖多亦不如受持此經四句之福多劫捨身不了空義妄心不除元是眾生一念持經我人頓盡妄想既除言下成佛故知多劫捨身不如持經四句之福離相寂滅分第十四爾時須菩提聞說是經深解意趣涕淚悲泣而白佛言希有世尊佛說如是甚深經典我從昔來所得慧眼未曾得聞如是之經世尊若復有人得聞是經信心清淨則生實相當知是人成就第一希有功德自性不癡名慧眼聞法自悟名法眼須菩提是阿羅漢於五百弟子中解空第一已曾勤奉多佛豈得不聞如是深法豈於釋迦牟尼佛所始言聞也然或是須菩提於往昔所得乃聲聞慧眼至今方悟佛意故始得聞如是深經悲昔未悟故涕淚悲泣聞經諦念謂之清淨從清淨體中流出般若波羅蜜多深法當知決定成就諸佛功德也世尊是實相者即是非相是故如來說名實相雖行清淨行若見垢淨二相當情並是垢心即非清淨心也但心有所得即非實相也世尊我今得聞如是經典信解受持不足為難若當來世後五百歲其有眾生得聞是經信解受持是人則為第一希有何以故此人無我相無人相無眾生相無壽者相所以者何我相即是非相人相眾生相壽者相即是非相何以故離一切諸相則名諸佛須菩提深悟佛意蓋自見業盡垢除慧眼明徹信解受持即無難也世尊在世說法之時亦有無量眾生不能信解受持何必獨言後五百歲蓋佛在之日雖有中下根不信及懷疑者即往問佛佛即隨宜為說無不契悟佛滅度後後五百歲漸至末法去聖遙遠但存言教人若有疑無處咨決愚迷抱執不悟無生著相馳求輪迴諸有於此時中得聞深經清心敬信悟無生理者甚為希有故言第一希有於如來滅後後五百歲若復有人能於般若波羅蜜甚深經典信解受持者即知此人無我人眾生壽者之相無此四相是名實相即是佛心故曰離一切諸相則名諸佛佛告須菩提如是如是佛印可須菩提所解善契我心故重言如是也若復有人得聞是經不驚不怖不畏當知是人甚為希有聲聞久著法相執有為解不了諸法本空一切文字皆是假立忽聞深經諸相不生言下即佛所以驚怖唯是上根菩薩得聞此理歡喜受持心無畏怖退轉如此之流甚為希有何以故須菩提如來說第一波羅蜜即非第一波羅蜜是名第一波羅蜜口說心不行即非口說心行即是心有能所即非心無能所即是須菩提忍辱波羅蜜如來說非忍辱波羅蜜見有辱境當情即非不見辱境當情即是見有身相當彼所害即非不見有身相當彼所害即是何以故須菩提如我昔為歌利王割截身體我於爾時無我相無人相無眾生相無壽者相何以故我於往昔節節支解時若有我相人相眾生相壽者相應生瞋恨如來因中在初地時為忍辱仙人被歌利王割截身體無一念痛惱之心若有痛惱之心即生嗔恨歌利王是梵語此云無道極惡君也一說如來因中曾為國王常行十善利益蒼生國人歌讚此王故云歌利王求無上菩提修忍辱行爾時天帝釋化作旃陀羅乞王身肉即割施殊無嗔惱今有二說於理俱通須菩提又念過去於五百世作忍辱仙人於爾所世無我相無人相無眾生相無壽者相如來因中於五百世修行忍辱波羅蜜以得四相不生如來自述往因者欲令一切修行人成就忍辱波羅蜜行忍辱波羅蜜人既行忍辱行者不見一切人過惡冤親平等無是無非被他打罵殘害歡喜受之倍加恭敬行如是行者即能成就忍辱波羅蜜是故須菩提菩薩應離一切相發阿耨多羅三藐三菩提心不應住色生心不應住聲香味觸法生心應生無所住心不應住色生心者是都標也聲香等別立其名也於此六塵起憎愛心由是妄心積身無能覺照益遠佛行雖種種勤苦修行不除心垢終無解脫之理推其根本都由色上住心如能念念常行般若波羅蜜推諸法空不生計較念念常自精進一心守護無令放逸淨名經云求一切知無非時求大般若經云菩薩摩訶薩晝夜精勤常住般若波羅蜜法相應作意無時暫捨若心有住則為非住若心住涅槃非是菩薩住處不住涅槃不住諸法一切處不住方是菩薩住處上文說應無所住而生其心是也是故佛說菩薩心不應住色布施須菩提菩薩為利益一切眾生應如是布施菩薩不為求望自身快樂而行布施但為內破慳心外利益一切眾生而行布施如來說一切諸相即是非相又說一切眾生則非眾生如者不生來者不滅不生者我人不生不滅者覺照不滅下文云如來者無所從來亦無所去故名如來如來說我人等相畢竟可破壞非真實體也一切眾生盡是假名若離妄心即無眾生可得故言即非眾生須菩提如來是真語者實語者如語者不誑語者不異語者真語者說一切有情無情皆有佛性實語者說眾生造惡業定受苦報如語者說眾生修善法定有樂報不誑語者說般若波羅蜜法出生三世佛決定不虗不異語者如來所說初善中善後善旨意微妙一切天魔外道無有能超勝及破壞佛語者須菩提如來所得法此法無實無虗無實者以法體空寂無相可得然中有恒沙性德用之不匱故言無虗欲言其實無相可得欲言其虗用而無間是故不得言無不得言有有而不有無而不無言譬不及者其惟真智乎若不離相修行無由臻此須菩提若菩薩心住於法而行布施如人入闇則無所見施一切法心有住著則不了三輪體空如盲者處暗無所曉了華嚴經云聲聞在如來會中聞法如盲如聾為住諸法相故也若菩薩心不住法而行布施如人有目日光明照見種種色若菩薩常行般若波羅蜜多無著無相行如人有目處於皎日之中何所不見也須菩提當來之世若有善男子善女人能於此經受持讀誦則為如來以佛智慧悉知是人悉見是人皆得成就無量無邊功德當來之世者如來滅後後五百歲濁惡之世邪法競起正法難行於此時中若有善男子善女人得遇此經從師稟受讀誦在心精進不妄依義修行悟入佛之知見則能成就阿耨菩提以是三世諸佛無不知之持經功德分第十五須菩提若有善男子善女人初日分以恒河沙等身布施中日分復以恒河沙等身布施後日分亦以恒河沙等身布施如是無量百千萬億劫以身布施若復有人聞此經典信心不逆其福勝彼何況書寫受持讀誦為人解說佛說末法之時得聞此經信心不逆四相不生即是佛之知見此人功德勝前多劫捨身功德百千萬億不可譬喻一念聞經其福尚多何況更能書寫受持讀誦為人解說當知此人決定成就阿耨多羅三藐三菩提所以種種方便為說如是甚深經典俾離諸相得阿耨多羅三藐三菩提所得福德無有邊際蓋緣多劫捨身不了諸法本空心有能所未離眾生之見如能聞經悟道我人頓盡言下即佛將捨身有漏之福比持經無漏之慧實不可及故雖十方聚寶三世捨身不如持經四句偈須菩提以要言之是經有不可思議不可稱量無邊功德持經之人心無我所無我所故是佛心佛心功德無有邊際故言不可稱量如來為發大乘者說為發最上乘者說若有人能受持讀誦廣為人說如來悉知是人悉見是人皆得成就不可量不可稱無有邊不可思議功德如是人等則為荷擔如來阿耨多羅三藐三菩提大乘者智慧廣大善能建立一切法最上乘者不見垢法可厭不見淨法可求不見眾生可度不見涅槃可證不作度眾生心亦不作不度眾生心是名最上乘亦名一切智亦名無生忍亦名大般若若有人發心求佛無上道聞此無相無為甚深之法即當信解受持為人解說令其深悟不生毀謗得大忍力大智慧力大方便力方能通流此經也上根之人聞此經典得深悟佛意持自心經見性究竟復起利他之行能為人解說令諸學者自悟無相之理得見本性如來成無上道當知說法之人所得功德無有邊際不可稱量聞經解義如教修行復能廣為人說令諸眾生得悟修行無相無著之行以能行此行有大智慧光明出離塵勞雖離塵勞不作離塵勞之念即得阿耨多羅三藐三菩提故名荷擔如來當知持經之人自有無量無邊不可思議功德何以故須菩提若樂小法者著我見人見眾生見壽者見則於此經不能聽受讀誦為人解說何名樂小法者為二乘聲聞人樂小果不發大心故即於如來深法不能受持讀誦為人解說須菩提在在處處若有此經一切世間天人阿修羅所應供養當知此處則為是塔皆應恭敬作禮圍繞以諸華香而散其處若人口誦般若心行般若在在處處常行無為無相之行此人所在之處如有佛塔感得一切天人各持供養作禮恭敬與佛無異能受持經者是人心中自有世尊故云如佛塔廟當知所得福德無量無邊也能淨業障分第十六復次須菩提善男子善女人受持讀誦此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為銷滅當得阿耨多羅三藐三菩提佛言持經之人各得一切天人恭敬供養為前生有重業障故今生雖得受持諸佛如來甚深經典常被人輕賤不得人恭敬供養自以受持經典故不起人我等相不問冤親常行恭敬心無惱恨蕩然無所計較念念常行般若波羅蜜行曾無退轉以能如是修行故得無量劫以至今生所有極惡罪障並能消滅又約理而言先世即是前念妄心今世即是後念覺心以後念覺心輕賤前念妄心妄不得住故云先世罪業即為消滅妄念既滅罪業不成即得菩提也須菩提我念過去無量阿僧祇劫於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者若復有人於後末世能受持讀誦此經所得功德於我所供養諸佛功德百分不及一百千萬億分乃至算數譬喻所不能及供養恒沙諸佛施寶滿三千界捨身如微塵數種種福德不及持經一念悟無生理息希望心遠離眾生顛倒知見即到波羅彼岸永出三塗證無餘涅槃也須菩提若善男子善女人於後末世有受持讀誦此經所得功德我若具說者或有人聞心即狂亂狐疑不信佛言末法眾生德薄垢重嫉妬彌深邪見熾盛於此時中如有善男子善女人受持讀誦此經圓成法相了無所得念念常行慈悲喜捨謙下柔和究竟成就無上菩提或有人不知如來正法常在不滅聞說如來滅後後五百歲有人能成就無相心行無相行得阿耨多羅三藐三菩提則必心生驚怖狐疑不信須菩提當知是經義不可思議果報亦不可思議是經義者即無著無相行也云不可思議者讚歎無著無相行能成就阿耨多羅三藐三菩提究竟無我分第十七爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切眾生滅度一切眾生已而無有一眾生實滅度者須菩提問佛如來滅後後五百歲若有人發阿耨多羅三藐三菩提心依何法而住如何降伏其心佛言當發度脫一切眾生心度脫一切眾生盡得成佛已不得見有一眾生是我滅度者何以故為除能所心也除有眾生心也亦除我見心也何以故須菩提若菩薩有我相人相眾生相壽者相則非菩薩菩薩若見有眾生可度者即是我相有能度眾生心即是人相謂涅槃可求即是眾生相見有涅槃可證即是壽者相有此四相即非菩薩所以者何須菩提實無有法發阿耨多羅三藐三菩提心者有法者我人等四法是也不除四法終不得菩提若言我發菩提心者亦是人我等法人我等法是煩惱根本須菩提於意云何如來於然燈佛所有法得阿耨多羅三藐三菩提不不也世尊如我解佛所說義佛於然燈佛所無有法得阿耨多羅三藐三菩提佛言如是如是佛告須菩提我於師處不除四相得受記不須菩提深解無相之理故言不也善契佛意故佛言如是如是言是印可之辭須菩提實無有法如來得阿耨多羅三藐三菩提須菩提若有法如來得阿耨多羅三藐三菩提者然燈佛即不與我受記汝於來世當得作佛號釋迦牟尼以實無有法得阿耨多羅三藐三菩提是故然燈佛與我受記作是言汝於來世當得作佛號釋迦牟尼何以故如來者即諸法如義佛言實無我人眾生壽者始得受菩提記我若有發菩提心然燈佛即不與我受記以實無所得然燈佛始與我受記此一段乃總成須菩提無我義佛言諸法如義者諸法即是色聲香味觸法於此六塵中善能分別而本體湛然不染不著曾無變異如空不動圓通瑩徹歷劫常存是名諸法如義菩薩瓔珞經云毀譽不動是如來行入佛境界經云諸欲不染故敬禮無所觀若有人言如來得阿耨多羅三藐三菩提須菩提實無有法佛得阿耨多羅三藐三菩提須菩提如來所得阿耨多羅三藐三菩提於是中無實無虗佛言實無所得心而得菩提以所得心不生是故得菩提離此心外更無菩提可得故言無實也所得心寂滅一切智本有萬行悉圓備恒沙德性用無乏少故言無虗也是故如來說一切法皆是佛法須菩提所言一切法者即非一切法是故名一切法能於諸法心無取舍亦無能所熾然建立一切法而心常空寂故知一切法皆是佛法恐迷者貪著一切法以為佛法為遣此病故言即非一切法心無能所寂而常照定慧齊行體用一致是故名一切法須菩提譬如人身長大須菩提言世尊如來說人身長大則為非大身是名大身如來說人身長大則為非大身者以顯一切眾生法身不二無有限量是名大身法身本無處所故言則非大身又以色身雖大內無智慧即非大身色身雖小內有智慧得名大身雖有智慧不能依行即非大身依教修行悟入諸佛無上智見心無能所限量是名大身也須菩提菩薩亦如是若作是言我當滅度無量眾生則不名菩薩菩薩若言因我說法除得彼人煩惱即是法我若言我度得眾生即有我所雖度脫眾生心有能所我人不除不得名為菩薩熾然說種種方便化度眾生心無能所即是菩薩也何以故須菩提實無有法名為菩薩是故佛說一切法無我無人無眾生無壽者須菩提若菩薩作是言我當莊嚴佛土是不名菩薩何以故如來說莊嚴佛土者即非莊嚴是名莊嚴菩薩若言我能建立世界者即非菩薩雖然建立世界心有能所即非菩薩熾然建立世界能所心不生是名菩薩最勝妙定經云假使有人造得白銀精舍滿三千大千世界不如一念禪定心心有能所即非禪定能所不生是名禪定禪定即是清淨心也須菩提若菩薩通達無我法者如來說名真是菩薩於諸法相無所滯礙是名通達不作解法心是名無我法無我法者如來說名真是菩薩隨分行持亦得名為菩薩然未為真菩薩解行圓滿一切能所心盡方得名真是菩薩一體同觀分第十八須菩提於意云何如來有肉眼不如是世尊如來有肉眼須菩提於意云何如來有天眼不如是世尊如來有天眼須菩提於意云何如來有慧眼不如是世尊如來有慧眼須菩提於意云何如來有法眼不如是世尊如來有法眼須菩提於意云何如來有佛眼不如是世尊如來有佛眼一切人盡有五眼為迷所覆不能自見故佛教除却迷心即五眼開明念念修行般若波羅蜜法初除迷心名為第一肉眼見一切眾生皆有佛性起憐愍心是名為第二天眼癡心不生名為第三慧眼著法心除名為第四法眼細惑永盡圓明徧照名為第五佛眼又云見色身中有法身名為天眼見一切眾生各具般若性名為慧眼見性明徹能所永除一切佛法本來自備名為法眼見般若波羅蜜能生三世一切法名為佛眼須菩提於意云何如恒河中所有沙佛說是沙不如是世尊如來說是沙須菩提於意云何如一恒河中所有沙有如是沙等恒河是諸恒河所有沙數佛世界如是寧為多不甚多世尊恒河者西國祗洹精舍側近之河如來說法常指此河為喻佛說此河中沙一沙況一佛世界以為多不須菩提言甚多世尊佛舉此眾多國數者欲明其中所有眾生一一眾生皆有若許心數也佛告須菩提爾所國土中所有眾生若干種心如來悉知何以故如來說諸心皆為非心是名為心爾所國土中所有眾生一一眾生皆有若干差別心數心數雖多總名妄心識得妄心非心是名為心此心即是真心常心佛心般若波羅蜜心清淨菩提涅槃心也所以者何須菩提過去心不可得現在心不可得未來心不可得過去心不可得者前念妄心潛然已過追尋無有處所現在心不可得者真心無相憑何得見未來心不可得者本無可得習氣已盡更不復生了此三心皆不可得是名為佛法界通化分第十九須菩提於意云何若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實如來不說得福德多以福德無故如來說得福德多七寶之福不能成就佛果菩提故言無也以其無量數限故名曰多如能超過即不說多也離色離相分第二十須菩提於意云何佛可以具足色身見不不也世尊如來不應以具足色身見何以故如來說具足色身即非具足色身是名具足色身佛意恐眾生不見法身但見三十二相八十種好紫磨金輝以為如來真身為遣此迷故問須菩提佛可以具足色身相見不三十二相即非具足色身內具三十二淨行是名具足色身淨行者即六波羅蜜是也於五根中修六波羅蜜於意根中定慧雙修是名具足色身徒愛如來三十二相內不行三十二淨行即非具足色身不愛如來色相能自持清淨行亦得名具足色身也須菩提於意云何如來可以具足諸相見不不也世尊如來不應以具足諸相見何以故如來說諸相具足即非具足是名諸相具足如來者即無相法身是也非肉眼所見慧眼乃能見之慧眼未明具足生我人等相以觀三十二相為如來者即不名為具足也慧眼明徹我人等相不生正智光明常照是名諸相具足三毒未泯言見如來真身者固無此理縱能見者祗是化身非真實無相之法身也非說所說分第二十一須菩提汝勿謂如來作是念我當有所說法莫作是念何以故若人言如來有所說法即為謗佛不能解我所說故須菩提說法者無法可說是名說法凡夫說法心有所得故告須菩提如來說法心無所得凡夫作能解心說如來語嘿皆如所發言辭如響應聲任用無心不同凡夫作生滅心說若言如來說法心有生滅者即為謗佛維摩經云真說法者無說無示聽法者無聞無得了萬法空寂一切名言皆是假立於自空性中熾然建立一切言辭演說諸法無相無為開導迷人令見本性修證無上菩提是名說法爾時慧命須菩提白佛言世尊頗有眾生於未來世聞說是法生信心不佛言須菩提彼非眾生非不眾生何以故須菩提眾生眾生者如來說非眾生是名眾生靈幽法師加此慧命須菩提六十二字是長慶二年今見在濠州鐘離等石上記六祖解在前故無解今亦存之無法可得分第二十二須菩提白佛言世尊佛得阿耨多羅三藐三菩提為無所得耶佛言如是如是須菩提我於阿耨多羅三藐三菩提乃至無有少法可得是名阿耨多羅三藐三菩提須菩提言所得心盡即是菩提佛言如是如是我於菩提實無希求心亦無所得心以如是故得名阿耨多羅三藐三菩提淨心行善分第二十三復次須菩提是法平等無有高下是名阿耨多羅三藐三菩提以無我無人無眾生無壽者修一切善法則得阿耨多羅三藐三菩提此菩提法者上至諸佛下至昆虫盡含種智與佛無異故言平等無有高下以菩提無二故但離四相修一切善法則得菩提若不離四相修一切善法轉增我人欲證解脫之心無由可得若離四相而修一切善法解脫可期修一切善法者於一切法無有染著對一切境不動不搖於出世法不貪不著不愛於一切處常行方便隨順眾生使之歡喜信服為說正法令悟菩提如是始名修行故言修一切善法須菩提所言善法者如來說非善法是名善法修一切善法希望果報即非善法六度萬行熾然俱作心不望報是名善法福智無比分第二十四須菩提若三千大千世界中所有諸須彌山王如是等七寶聚有人持用布施若人以此般若波羅蜜經乃至四句偈等受持讀誦為他人說於前福德百分不及一百千萬億分乃至算數譬喻所不能及大鐵圍山高廣二百二十四萬里小鐵圍山高廣一百一十二萬里須彌山高廣三百三十六萬里以此名為三千大千世界就理而言即貪嗔癡妄念各具一千也如爾許山盡如須彌以況七寶數持用布施所得福德無量無邊終是有漏之因而無解脫之理摩訶般若波羅蜜多四句經文雖少依之修行即得成佛是知持經之福能令眾生證得菩提故不可比化無所化分第二十五須菩提於意云何汝等勿謂如來作是念我當度眾生須菩提莫作是念何以故實無有眾生如來度者若有眾生如來度者如來則有我人眾生壽者須菩提意謂如來有度眾生心佛為遣須菩提如是疑心故言莫作是念一切眾生本自是佛若言如來度得眾生成佛即為妄語以妄語故即是我人眾生壽者此為遣我所心也夫一切眾生雖有佛性若不因諸佛說法無由自悟憑何修行得成佛道須菩提如來說有我者則非有我而凡夫之人以為有我須菩提凡夫者如來說即非凡夫是名凡夫如來說有我者是自性清淨常樂我淨之我不同凡夫貪嗔無明虗妄不實之我故言凡夫之人以為有我有我人者即是凡夫我人不生即非凡夫心有生滅即是凡夫心無生滅即非凡夫不悟般若波羅蜜多即是凡夫若悟般若波羅蜜多即非凡夫心有能所即是凡夫心無能所即非凡夫法身非相分第二十六須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來佛言須菩提若以三十二相觀如來者轉輪聖王則是如來須菩提白佛言世尊如我解佛所說義不應以三十二相觀如來世尊大慈恐須菩提執相之病未除故作此問須菩提未知佛意乃言如是如是之言早是迷心更言以三十二相觀如來又是一重迷心離真轉遠故如來為說除彼迷心若以三十二相觀如來者轉輪聖王即是如來轉輪聖王雖有三十二相豈得同如來世尊引此言者以遣須菩提執相之病令其所悟深徹須菩提被問迷心頓釋故云如我解佛所說義不應以三十二相觀如來須菩提是大阿羅漢所悟甚深得方便不生迷路以冀世尊除遣細惑令後世眾生所見不謬也爾時世尊而說偈言若以色見我以音聲求我是人行邪道不能見如來若以兩字是發語之端色者相也見者識也我者是一切眾生身中自性清淨無為無相真常之體不可高聲念佛而得成就念須正念分明方得悟解若以色聲求之不可見也是知於相中觀佛聲中求法心有生滅不悟如來矣無斷無滅分第二十七須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者說諸法斷滅相莫作是念何以故發阿耨多羅三藐三菩提心者於法不說斷滅相須菩提聞說真身離相便謂不修三十二淨行而得菩提佛語須菩提莫言如來不修三十二淨行而得菩提汝若言不修三十二淨行得阿耨菩提者即是斷佛種性無有是處不受不貪分第二十八須菩提若菩薩以滿恒河沙等世界七寶持用布施若復有人知一切法無我得成於忍此菩薩勝前菩薩所得功德何以故須菩提以諸菩薩不受福德故須菩提白佛言世尊云何菩薩不受福德須菩提菩薩所作福德不應貪著是故說不受福德通達一切法無能所心是名為忍此人所得福德勝前七寶之福菩薩所作福德不為自己意在利益一切眾生故言不受福德威儀寂靜分第二十九須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來如來者非來非不來非去非不去非坐非不坐非臥非不臥行住坐臥四威儀中常在空寂即是如來也一合相理分第三十須菩提若善男子善女人以三千大千世界碎為微塵於意云何是微塵眾寧為多不甚多世尊何以故若是微塵眾實有者佛即不說是微塵眾所以者何佛說微塵眾則非微塵眾是名微塵眾佛說三千大千世界以喻一切眾生性上微塵之數如三千大千世界中所有微塵一切眾生性上妄念微塵即非微塵聞經悟道覺慧常照趣向菩提念念不住常在清淨如是清淨微塵是名微塵眾世尊如來所說三千大千世界則非世界是名世界三千者約理而言即貪嗔癡妄念各具一千數也心為善惡之樞能作凡作聖其動靜不可測度廣大無邊故名大千世界何以故若世界實有者則是一合相如來說一合相則非一合相是名一合相心中明了莫過悲智二法由此二法而得菩提說一合相者心存所得故即非一合相心無所得是名一合相一合相者不得假名而談實相須菩提一合相者即是不可說但凡夫之人貪著其事由悲智二法成就佛果菩提說不可盡妙不可言凡夫之人貪著文字事業不行悲智二法若不行悲智二法而求無上菩提何由可得知見不生分第三十一須菩提若人言佛說我見人見眾生見壽者見須菩提於意云何是人解我所說義不不也世尊是人不解如來所說義何以故世尊說我見人見眾生見壽者見即非我見人見眾生見壽者見是名我見人見眾生見壽者見如來說此經者令一切眾生自悟般若智慧自修行菩提之果凡夫之人不解佛意便謂如來說我人等見不知如來說甚深無相無為般若波羅蜜法如來所說我人等見不同凡夫我人等見如來說一切眾生皆有佛性是真我見說一切眾生有無漏智性本自具足是人見說一切眾生本自無煩惱是眾生見說一切眾生性本不生不滅是壽者見須菩提發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相須菩提所言法相者如來說即非法相是名法相發菩提心者應見一切眾生皆有佛性應見一切眾生無漏種智本自具足應信一切眾生自性本無生滅雖行一切智慧方便接物利生不作能所之心口說無相法而心有能所即非法相口說無相法心行無相行而能所心滅是名法相也應化非真分第三十二須菩提若有人以滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演說其福勝彼云何為人演說不取於相如如不動七寶之福雖多不如有人發菩提心受持此經四句為人演說其福勝彼百千萬億不可譬喻說法善巧方便觀根應量種種隨宜是名為人演說所聽法人有種種相貌不等不得作分別之心但了空寂如如之心無所得心無勝負心無希望心無生滅心是名如如不動也何以故一切有為法如夢幻泡影如露亦如電應作如是觀夢者是妄身幻者是妄念泡者是煩惱影者是業障夢幻泡影業是名有為法真實離名相悟者無諸業佛說是經已長老須菩提及諸比丘比丘尼優婆塞優婆夷一切世間天人阿修羅聞佛所說皆大歡喜信受奉行六祖口訣後序法性圓寂本無生滅因有生念遂有生緣故天得命之以生是故謂之命天命既立真空入有前日生念轉而為意識意識之用散而為六根六根各有分別中有所總持者是故謂之心心者念慮之所在也神識之所舍也真妄之所共處者也當凡夫聖賢幾會之地也一切眾生自無始來不能離生滅者皆為此心所累故諸佛惟教人了此心此心了即見自性見自性則是菩提也此在性時皆自空寂而湛然若無緣有生念而後有者也有生則有形形者地水火風之聚沫也以血氣為體有生者之所託也血氣足則精足精足則生神神足則生妙用然則妙用者即是在吾圓寂時之真我也因形之遇物故見之於作為而已但凡夫迷而逐物聖賢明而應物逐物者自彼應物者自我自彼者著於所見故覓輪迴自我者當體常空萬劫如一合而觀之皆心之妙用也是故當其未生之時所謂性者圓滿具足空然無物湛乎自然其廣大與虗空等往來變化一切自由天雖欲命我以生其可得乎天猶不能命我以生況於四大乎況於五行乎既有生念又有生緣故天得以生命我四大得以氣形我五行得以教約我此有生者之所以有滅也然則生滅則一在凡夫聖賢之所以生滅則殊凡夫之人生緣念有識隨業變習氣薰染因生愈甚故既生之後心著諸妄妄認四大以為我身妄認六親以為我有妄認色聲以為快樂妄認塵勞以為富貴心自知見無所不妄諸妄既起煩惱萬差妄念奪真真性遂隱人我為主真識為客三業前引百業後隨流浪生死無有涯際生盡則滅滅盡復生生滅相尋至墮諸趣在於諸趣轉轉不知愈恣無明造諸業罟遂至塵沙劫盡不復人身聖賢則不然聖賢生不因念應迹而生欲生則生不待彼命故既生之後圓寂之性依舊湛然無體相無罣礙其照萬法如青天白日無毫髮隱滯故建立一切善法徧於沙界不見其少攝受一切眾生皈於寂滅不以為多驅之不能來逐之不能去雖託四大為形五行為養皆我所假未甞妄認我緣苟盡我迹當滅委而去之如來去耳於我何與哉是故凡夫有生則有滅滅者不能不生聖賢有生亦有滅滅者歸於真空是故凡夫生滅如身中影出入相隨無有盡時聖賢生滅如空中雷自發自止不累於物世人不知生滅之如此而以生滅為煩惱大患蓋不自覺也覺則見生滅如身上塵當一振奮耳何能緣我性哉昔我如來以大慈悲心閔一切眾生迷錯顛倒流浪生死之如此又見一切眾生本有快樂自在性皆可修證成佛欲一切眾生盡為聖賢生滅不為凡夫生滅猶慮一切眾生無始以來流浪日久其種性已差未能以一法速悟故為說八萬四千法門門門可入皆可到真如之地每說一法門莫非丁寧實語欲使一切眾生各隨所見法門入自心地到自心地見自佛性證自身佛即同如來是故如來於諸經說有者欲使一切眾生覩相生善說無者欲使一切眾生離相見性所說色空亦復如是然而眾生執著見有非真有見無非真無其見色見空皆如是執著復起斷常二見轉為生死根蒂不示以無二法門又將迷錯顛倒流浪生死甚於前日故如來又為說大般若法破斷常二見使一切眾生知真有真無真色真空本來無二亦不遠人湛然寂靜只在自己性中但以自己性智慧照破諸妄則曉然自見是故大般若經六百卷皆如來為菩薩果人說佛性然而其間猶有為頓漸者說惟金剛經為發大乘者說為發最上乘者說是故其經先說四生四相次云凡所有相皆是虗妄若見諸相非相即見如來蓋顯一切法至無所住是為真諦故如來於此經凡說涉有即破之以非真取實相以示眾生蓋恐眾生不解所說其心反有所住故也如所謂佛法即非佛法之類是也是故六祖大師於五祖傳衣付法之際聞說此經云應無所住而生其心言下大悟是為第六祖如來云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出其信乎哉適少觀檀經聞六祖由此經見性疑必有所演說未之見也及知曹州濟陰於邢君固處得六祖口訣一本觀其言簡辭直明白倒斷使人易曉而不惑喜不自勝又念京東河北陝西人資性質朴信厚遇事決裂若使學佛性必能勇猛精進超越過人然其為講師者多傳百法論上生經而已其學者不知萬法隨緣生緣盡法亦應滅反以法為法固守執著遂為法所縛死不知解猶如陷沙之人力與沙爭愈用力而愈陷不知勿與沙爭即能出陷良可惜也適遂欲以六祖金剛經口訣鏤板流傳以開發此數方學者佛性然以文多脫誤因廣求別本勘校十年間凡得八本惟杭越建陝四本文多同因得刊正冤句董君遵力勸成之且卒諸朝士以資募工士大夫聞者皆樂見助四明樓君常願終求其事嗚呼如來云無法可說是名說法夫可見於言語文字者豈佛法之真諦也然非言語文字則真諦不可得而傳也學者因六祖口訣以求金剛經因金剛經以求自佛性見自佛性然後知佛法不止於口訣而已如此則六祖之於佛法其功可思議乎哉或者以六祖不識字疑口訣非六祖所作譬夫大藏經豈是世尊自作耶亦聽法者之所傳也或六祖言之而弟子傳之吾不可得而知也苟因口訣可以見經何疑其不識字也允豐七年六月十日天台羅適謹序重刻六祖金剛經解䟦余生也魯其於佛氏教典諸書素未知旁究且境值多艱碌碌塵務洵云視肉頃聞石堂大師飛錫吳山之海會寺慈雲布藹法雨披井遠近嚮慕而瞻禮者無數遂發大菩提心登座說法首宣金剛無上玅義余亦得從大眾中拱聽旬日因詢師之解金剛誠所謂開聾啟瞶光明洞達矣從來之訓註金剛者果以何說為最師云解此不下千餘家而余素所尊信惟六祖解為第一但流通雖久而板實沉沒向曾發有重刊之願奈力薄緣艱未遑從事耳噫師之度世弘慈抑何廣大無窮已哉余雖不敏請為授梓以畢師志雖然師願之而余請之云何為余梓也祖解之而師傳之云何為師梓也但使天下後世永為流播人人知有此解咸克無相無住而降伏其心則師之願庶幾稍慰矣夫順治癸巳夏五月錢塘邑弟子湯翼聖沐手拜題重刻六祖金剛經解䟦余秉性樸素弗事浮華每問鯨鐘梵唄之音輙喜動顏色留連旬日不忍釋去非盡緣經啟悟亦夙植之性使然也昨歲隨渭陽氏住榕省署中與塵俗差遠元夕觀燈於康衢問禪誦聲造其室得金剛般若經係六代祖師所解者義理弘敷詞旨超邁一閱而瞭然如千日之并照無緣寔滯礙方知六祖於客店聞經而解悟者無二致也大矣哉我佛之妙證淵深掃空執著使人人撥散疑雲曉徹性天而祖師探幽闡奧直洞真元信矣無一法而不津梁即五蘊而咸資解脫者也此經解者無慮數百家惟六祖大師解為最上上得而隨喜頂授乃諸佛之所護念付囑耳敢不銘骨鏤肌以共報恩光乎因捐資剞劂以廣流通俾閱經而知旨從解以得源顯煥性宗殞空諸相即不住相亦不壞相其布施福德宜可與色見聲求者同日而語哉敬䟦康熈丁未歲孟春鍾秀奉佛弟子周克順浩名超諫和南
